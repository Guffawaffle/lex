name: Publish to MCP Registry

# SECURITY: Runs only from a signed release tag or a recovery dispatch that
# checks out that same immutable tag. The protected publish job requires
# reviewer approval before it can use the DNS key.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Published coordinated release version (for example, 3.0.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (validate only, do not publish)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  MCP_PUBLISHER_VERSION: "1.7.9"
  MCP_PUBLISHER_SHA256: "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac"

# MINIMAL PERMISSIONS: No id-token needed for DNS auth (uses private key signing)
permissions:
  contents: read

jobs:
  # Job 1: Validate (no protected environment - runs on all triggers)
  validate:
    name: Validate server.json
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies (hermetic)
        run: npm ci --ignore-scripts
      - name: Resolve and validate release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid release version: $VERSION"
            echo "Expected: {major}.{minor}.{patch}"
            exit 1
          fi
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "❌ Version mismatch: requested $VERSION, package.json $PACKAGE_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Release version: $VERSION"

      - name: Verify selected signed release tag
        env:
          TRUSTED_GPG_KEYS: ${{ secrets.TRUSTED_GPG_KEYS }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          if [ -z "$TRUSTED_GPG_KEYS" ]; then
            echo "❌ TRUSTED_GPG_KEYS is required to verify release tags"
            exit 1
          fi
          echo "$TRUSTED_GPG_KEYS" | base64 -d | gpg --import
          if ! git rev-parse --verify "${TAG}^{tag}" >/dev/null 2>&1; then
            echo "❌ ${TAG} must be an annotated tag"
            exit 1
          fi
          git verify-tag "$TAG"
          echo "✅ Verified signed release tag: $TAG"

      - name: Verify manifest, published packages, and schema
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          curl -fsSL "https://static.modelcontextprotocol.io/schemas/2025-12-11/server.schema.json" -o /tmp/mcp-server.schema.json
          npm view "@smartergpt/lex@${VERSION}" --json > /tmp/lex-core-package.json
          npm view "@smartergpt/lex-mcp@${VERSION}" --json > /tmp/lex-mcp-package.json
          node scripts/verify-mcp-registry-contract.mjs \
            --version "$VERSION" \
            --schema /tmp/mcp-server.schema.json \
            --core-metadata /tmp/lex-core-package.json \
            --wrapper-metadata /tmp/lex-mcp-package.json

      - name: Check if should publish
        id: check
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Dry Run Summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: |
          echo "🧪 Dry run complete - manifest and published package contract are valid"
          echo "ℹ️  To publish:"
          echo "   - Re-run this workflow with dry_run=false, OR"
          echo "   - Push the signed release tag after both npm packages are published"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### MCP Registry Validation (Dry Run)" >> $GITHUB_STEP_SUMMARY
          echo "🧪 Dry run completed - validation only" >> $GITHUB_STEP_SUMMARY
          echo "📦 Version: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Server: \`dev.smartergpt/lex\`" >> $GITHUB_STEP_SUMMARY

  # Job 2: Publish (protected environment - requires reviewer approval)
  publish:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_publish == 'true'
    environment: mcp-publish
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.sha }}

      - name: Confirm immutable release checkout
        run: |
          echo "Checked out the immutable release tag."

      - name: Download mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" -o mcp-publisher.tar.gz
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz
          chmod +x mcp-publisher

      # DNS Authentication with Ed25519 private key
      # SECURITY: Private key is never echoed; uses proper quoting
      - name: Authenticate with MCP Registry (DNS)
        env:
          MCP_REGISTRY_PRIVATE_KEY_HEX: ${{ secrets.MCP_REGISTRY_PRIVATE_KEY_HEX }}
        run: |
          echo "🔐 Authenticating with DNS verification (smartergpt.dev)..."
          ./mcp-publisher login dns --domain "smartergpt.dev" --private-key "${MCP_REGISTRY_PRIVATE_KEY_HEX}"
          echo "✅ Authentication successful"

      - name: Publish to MCP Registry
        run: |
          echo "🚀 Publishing to MCP Registry..."
          ./mcp-publisher publish
          echo "✅ Published successfully to registry.modelcontextprotocol.io"

      - name: Verify live registry entry
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          for attempt in {1..12}; do
            if node scripts/verify-mcp-registry-publication.mjs --version "$VERSION"; then
              exit 0
            fi
            echo "Registry entry not visible yet (attempt $attempt/12); retrying in 5 seconds..."
            sleep 5
          done
          echo "❌ Published registry entry did not become the latest version in time"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "### MCP Registry Publication Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "✅ Triggered by release tag: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Manual publish completed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Version: \`${{ needs.validate.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "📋 Registry: MCP Registry (registry.modelcontextprotocol.io)" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Server: \`dev.smartergpt/lex\`" >> $GITHUB_STEP_SUMMARY
          echo "🔑 Auth: DNS (smartergpt.dev TXT record)" >> $GITHUB_STEP_SUMMARY
