name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate semver tag
        if: github.event_name == 'push'
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid semver tag: ${{ github.ref_name }}"
            exit 1
          fi
          echo "✅ Valid semver tag: ${{ github.ref_name }}"

      - name: Verify tag is signed
        if: github.event_name == 'push'
        env:
          TRUSTED_GPG_KEYS: ${{ secrets.TRUSTED_GPG_KEYS }}
        run: |
          if [ -z "$TRUSTED_GPG_KEYS" ]; then
            echo "❌ TRUSTED_GPG_KEYS is required to verify release tags"
            exit 1
          fi
          echo "$TRUSTED_GPG_KEYS" | base64 -d | gpg --import
          git verify-tag "${{ github.ref_name }}"
          echo "✅ Tag signature verified"

  build-and-test:
    name: Build & Test for Release
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies (hermetic)
        run: npm ci --ignore-scripts

      - name: Build native dependencies
        run: npm rebuild better-sqlite3-multiple-ciphers

      - name: Build package
        run: npm run build

      - name: Run all tests
        run: npm run test:all

      - name: Validate packed package and clean consumer
        run: |
          npm run guard:pack
          npm run test:smoke

      - name: Create tarball
        run: npm pack --ignore-scripts

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: npm-package
          path: smartergpt-lex-*.tgz
          retention-days: 7
          if-no-files-found: error

